<!DOCTYPE html>
<html>
<head>
  <title>Firebase OTP Login</title>

  <!-- Firebase SDK (COMPAT version - IMPORTANT) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>

<body>

  <h2>📱 Phone OTP Login</h2>

  <!-- Phone Input -->
  <input type="tel" id="phone" placeholder="+919876543210">
  <br><br>

  <!-- reCAPTCHA -->
  <div id="recaptcha-container"></div>

  <br>
  <button onclick="sendOTP()">Send OTP</button>

  <br><br>

  <!-- OTP Input -->
  <input type="text" id="otp" placeholder="Enter OTP">
  <br><br>

  <button onclick="verifyOTP()">Verify OTP</button>

  <script>
    // 🔥 YOUR FIREBASE CONFIG (replace this)
    const firebaseConfig = {
      apiKey: "AIzaSyBmengcbTbOw8vXMWRuYzgtSjKFMyG4TwU",
      authDomain: "otpgenerator-3e01c.firebaseapp.com",
      projectId: "otpgenerator-3e01c",
      appId: "1:846449474736:web:614dda09febfbb005fcf75"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Setup reCAPTCHA
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier(
      'recaptcha-container',
      {
        size: 'normal'
      }
    );

    let confirmationResult;

    // 📤 Send OTP
    function sendOTP() {
      let phone = document.getElementById('phone').value.trim();

      // Basic validation
      if (!phone.startsWith("+91") || phone.length !== 13) {
        alert("Enter valid Indian number like +919876543210");
        return;
      }

      auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
        .then(function(result) {
          confirmationResult = result;
          alert("✅ OTP Sent Successfully!");
        })
        .catch(function(error) {
          alert("❌ Error: " + error.message);
          console.error(error);
        });
    }

    // 🔐 Verify OTP
    function verifyOTP() {
      let code = document.getElementById('otp').value;

      if (!code) {
        alert("Enter OTP");
        return;
      }

      confirmationResult.confirm(code)
        .then(function(result) {
          alert("🎉 Login Successful!");
          console.log(result.user);
        })
        .catch(function(error) {
          alert("❌ Invalid OTP");
        });
    }
  </script>

</body>
</html>
